services:
    api:
        build:
            context: .
            dockerfile: packages/api/Dockerfile
        ports:
            - '3000:3000'
        environment:
            - NODE_ENV=production
        restart: unless-stopped
        networks:
            - app-network

    app:
        build:
            context: .
            dockerfile: packages/app/Dockerfile
        ports:
            - '80:80'
        depends_on:
            - api
        restart: unless-stopped
        networks:
            - app-network

networks:
    app-network:
        driver: bridge
